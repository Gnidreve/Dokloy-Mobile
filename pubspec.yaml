name: mycrm
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  shadcn_ui: ^0.53.5
  flutter_svg: ^2.0.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.5.3
  pocketbase: ^0.22.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: lib/assets/app-logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: lib/assets/app-logo.png
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - .env
    - lib/assets/
  fonts:
    - family: CSRegular
      fonts:
        - asset: lib/assets/cs_regular.ttf
