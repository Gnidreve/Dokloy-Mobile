name: mycrm
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  shadcn_ui: ^0.53.5
  flutter_svg: ^2.0.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.5.3
  pocketbase: ^0.22.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: lib/assets/app-icon.png

flutter:
  uses-material-design: true
  assets:
    - .env
    - lib/assets/
  fonts:
    - family: CSRegular
      fonts:
        - asset: lib/assets/cs_regular.ttf
